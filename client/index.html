<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="alternate" type="application/rss+xml" title="DevCrunch" href="/rss.xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f8050" />
    <!-- Google AdSense (auto ads) — loads on every page incl. all articles -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7845606961004033"
      crossorigin="anonymous"
    ></script>
    <!--SEO-->
    <title>DevCrunch · Sharp takes on AI, startups &amp; security</title>
    <meta
      name="description"
      content="DevCrunch — sharp, fast tech journalism on AI, startups, and cybersecurity, written by people who build."
    />
    <link rel="canonical" href="https://devcrunch.tech/" />
    <!-- Open Graph (defaults; per-article values injected server-side) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DevCrunch" />
    <meta property="og:title" content="DevCrunch · Sharp takes on AI, startups &amp; security" />
    <meta
      property="og:description"
      content="Sharp, fast tech journalism on AI, startups, and cybersecurity, written by people who build."
    />
    <meta property="og:url" content="https://devcrunch.tech/" />
    <meta property="og:image" content="https://devcrunch.tech/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DevCrunch · Sharp takes on AI, startups &amp; security" />
    <meta
      name="twitter:description"
      content="Sharp, fast tech journalism on AI, startups, and cybersecurity, written by people who build."
    />
    <meta name="twitter:image" content="https://devcrunch.tech/og-image.png" />
    <!--/SEO-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      // Pre-paint theme to avoid flash of unstyled mode
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (
            t === 'dark' ||
            (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)
          ) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased selection:bg-brand-200 selection:text-brand-900 dark:bg-slate-950 dark:text-slate-50">
    <div id="root"></div>
    <script type="module" src="/src/app/main.jsx"></script>
  </body>
</html>
